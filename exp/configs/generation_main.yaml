      - 1.0
      num_calibration_samples: 1000
      heteroscedastic_scale_range:
      - 0.3
      - 3.0
    outcome_preserve_type: true
    outcome_info_multiplier: 1.75
    baseline_n_estimators: 100
    baseline_max_depth: 3
    baseline_learning_rate: 0.1
    calibration:
      fraction: 0.15
      min_rows: 64
      quantile_bins: 6
      holdout_fraction: 0.3
      holdout_min_rows: 24
    info_thresholds:
      min_information: 0.03
      lower_tail_quantiles:
      - 0.1
      - 0.25
      lower_tail_minima:
      - 0.04
      - 0.08
      average_information_min: 0.12
