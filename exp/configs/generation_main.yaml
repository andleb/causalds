          - 0.04
          - 0.08
          average_information_min: 0.12
      proxy_hard:
        enabled: true
        proxified_nodes_range:
        - 2
        - 5
        proxy_noise_scale_range:
        - 1.5
        - 4.0
        proxy_mechanism_config:
          prob_nn_mechanism: 0.45
          prob_mixture_noise: 0.45
          prob_heteroscedastic: 0.6
          heteroscedastic_scale_range:
          - 0.5
