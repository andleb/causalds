          prob_mixture_noise: 0.3
          prob_heteroscedastic: 0.3
          prob_mixture_root: 0.0
          prob_discretized: 0.0
          nn_hidden_layers_range:
          - 2
          - 4
          nn_hidden_units_range:
          - 4
          - 64
          nn_weight_scale: 5.0
          nn_output_value_range:
          - -1.0
          - 1.0
          num_calibration_samples: 1000
          heteroscedastic_scale_range:
          - 0.3
          - 3.0
        outcome_preserve_type: true
        outcome_info_multiplier: 1.75
        baseline_n_estimators: 100
        baseline_max_depth: 3
        baseline_learning_rate: 0.1
        calibration:
